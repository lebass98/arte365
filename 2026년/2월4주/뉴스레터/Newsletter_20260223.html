이달의 주제
문화예술교육의 방향 찾기
변화의 소용돌이 속에서 20주년을 맞이했던 문화예술교육은 지난 발자국을 되돌아보며 변화하지 않는 것에 대한 진지한 관찰과 그 지향점에서 방향을 찾고자 합니다. 함께 살아가는 사람들과 기꺼이 엮이고 교감했던 이들의 경험 속에서 지켜야 할 문화예술교육의 가치를 찾아 조명합니다.
편집노트 읽기

이슈
너의 말에 귀 기울일 때 세상은 변한다 
지역과 현장을 만나야 할 이유
전고필 영암문화관광재단 대표이사
언제부턴가 “나”와 “너” 사이에 대한 고민이 더욱 처절해진 시간이 지속된다. 문화기획자로 활동할 때부터 절실했는데 기초문화관광재단의 대표를 맡으면서 숨이 턱턱 막히도록 절박해졌다. 간절함이 있었던 시간을 되돌아보면 바로 현장에 발을 딛고 있었을 무렵이었다.

리뷰
양육자의 삶을 ‘예술’로 켜다
급변하는 시대, ‘활활살롱’이 선택한 속도 
강나경 전시공간 새탕라움 대표
제주 ‘활활살롱’은 글쓰기와 명상, 예술을 매개로 양육자의 삶을 다시 바라보는 공동체다. 빠르게 변화하는 기술과 사회 속에서, 이곳은 느리게 기록하고 천천히 연결하는 방식을 선택한다. 사라지기 쉬운 하루와 감정을 붙잡아 두는 일, 그 자체가 이 공동체가 수행하는 예술이다.

아이디어
표현의 길 위에 경사로 놓기
모두의 예술교육⑧ 예술교육에서의 접근성
이희원 작가·창작공간ㄴㄴ 대표
시각예술 교육 프로그램 &lt;넉넉&gt;에는 이미 자신의 그림 언어를 가지고 있는, 시각예술 분야에서 자신이 추구하고자 하는 바가 분명한 사람과 아직 그렇지 않은, 자신만의 무엇을 발견하지 못한 또는 크게 흥미가 없어 보이는 사람이 같이 지원했다. 후자의 그룹을 관찰하게 된 이야기다.
