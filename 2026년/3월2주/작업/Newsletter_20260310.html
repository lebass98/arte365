이달의 주제
문화예술교육의 방향 찾기
변화의 소용돌이 속에서 20주년을 맞이했던 문화예술교육은 지난 발자국을 되돌아보며 변화하지 않는 것에 대한 진지한 관찰과 그 지향점에서 방향을 찾고자 합니다. 함께 살아가는 사람들과 기꺼이 엮이고 교감했던 이들의 경험 속에서 지켜야 할 문화예술교육의 가치를 찾아 조명합니다.
편집노트 읽기

이슈
그 마음이 노동이다
인공지능 시대, 일을 대하는 마음
희정 기록노동자 
‘라떼는 말야’를 하고 싶을 때가 있다. “나 때는 말야. 녹취 풀어주는 프로그램, 그런 게 어디 있어. 일일이 다 듣고 타자 쳐서 말을 받아적는 거야. 한 시간짜리 인터뷰를 반나절에 걸쳐 풀고 그랬어. 요즘은 아주 편해졌지.” 그렇다. 이 말 하는 순간 ‘꼰대 인증’이다. 입 밖으로 뱉지 않는다. 입을 다물 수 있는 건 카세트만 한 녹음기를 들고 다니던 선배들이 떠오른 덕분이다.

리뷰
닫힌 몸에서 피어난 순간
‘피어나다 프로젝트’가 드러낸 몸의 감각
김율리아 성남예술교육가네트워크 STAN:D 사무국장
인간은 누구나 후련해지길 원하며 발버둥 친다. 그러나 쉰일곱의 안무가 김남식은 ‘무엇도 후련한 게 없는 것이 이 나이대’라고 덤덤히 고백하며 대화를 시작했다. 그는 자신을 거창한 ‘예술가’라는 수식어 대신, 그저 ‘춤추는 남자’라고 소개한다.

아이디어
동네의 시간을 품은 예술정거장
예술로 365길㉗ 놀라운 예술터·뜻밖의 미술관
김성혁 놀라운 예술터·뜻밖의 미술관 센터장
누군가에게는 지워야 했던 과거였고, 또 누군가에게는 끝내 견뎌야 했던 일상의 시간들. 전주 노송동의 한 동네는 오랫동안 ‘밖에서 붙여진 이름’으로 기록돼 왔다. 그러나 그 공간을 하루하루 지나온 사람들의 목소리는, 늘 조금 늦게 도착하곤 했다.
