<dd>반복되는 일상 속 크고 작은 변화들을 포착하는 것을 좋아하며, 인스타그램에 가족 이야기를 담은 만화 『펀자이씨툰』을 연재하고 있다. 단행본 『어디로 가세요 펀자이씨?』 『외계에서 온 펀자이씨』 『순간을 달리는 할머니』 『일상이 장르』(김그래, 쑥, 작가1 공저) 등을 쓰고 그렸다. 우애령 에세이 『행복한 철학자』 『행복의 선택』에 그림을 그렸으며, 현재 출판, 방송 분야에서 프리랜스 일러스트레이터로 활동하고 있다. <br>인스타그램 펀자이씨툰 <a href="https://www.instagram.com/stories/punj_toon/ " target="_blank" rel="noopener noreferrer">@punj_toon</a></dd>
