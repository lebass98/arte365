이달의 주제
문화예술교육의 방향 찾기
변화의 소용돌이 속에서 20주년을 맞이했던 문화예술교육은 지난 발자국을 되돌아보며 변화하지 않는 것에 대한 진지한 관찰과 그 지향점에서 방향을 찾고자 합니다. 함께 살아가는 사람들과 기꺼이 엮이고 교감했던 이들의 경험 속에서 지켜야 할 문화예술교육의 가치를 찾아 조명합니다.
편집노트 읽기

인터뷰
혼돈 속에 노래하며, 우주 마인드로 살아남기
우주마인드프로젝트 김승언·신문영
우연 독립기획자
당신의 궤변은 폭포처럼 쏟아지며 이 세계를 한도 끝도 없이 교란하고, 당신의 노래는 이 어둠과 혼돈 속에서 한 가닥 질서를 부여한다. 불안함을 견디는 유일한 전략은 유머를 잃지 않는 것뿐이라며, 전 지구의 위기를 우주의 마인드로 대면하고 있는 두 행성을 만나본다. 김승언, 신문영 – 두 분이 당도한 곳은 그 이름도 딱 들어맞는, 술술센터다. 

아이디어
함께 서는 예술가들 
모두의 예술교육⑨ 같이 만들어가는 무대
최아영 공연예술창작터 수다 배우
예술가란 무엇일까? 예술을 하는 사람을 예술가라고 하지. 예술의 정의가 있던가 그렇다면 정의된 예술이란 무엇인가? 아니 그보다 예술을 정의할 필요가 있던가? “그저 예술을 사랑하는 마음으로 내가 하고 싶은 이야기들을 예술가로서 전하면 그것이 예술가고 예술이 아니던가.” 2025 프로젝트 예술단 옴니버스의 ‘?공연’ <다다다닷>은 이런 생각에서 시작한다. 

리포트
갈등과 불안의 시대, 예술은 무엇을 상상할 것인가
<더 넥스트 노멀: 다이얼로그 인 아시아> 포럼이 제기하는 질문들
박지선 프로듀서그룹 도트 크리에이티브 프로듀서
지금 우리는 어떤 ‘정상’ 속에 살고 있는가. 기후위기, 심화하는 불평등, 전쟁, 이주, 시민의 자유와 주권을 둘러싼 갈등이 동시에 벌어지는 이 시대에, ‘정상’이라 여겨지는 것들은 과연 누가, 어떻게 만들어온 것인가. 지난 2월 대학로 예술가의 집에서 열린 <더 넥스트 노멀: 다이얼로그 인 아시아> 포럼은 바로 이 질문에서 출발했다.
