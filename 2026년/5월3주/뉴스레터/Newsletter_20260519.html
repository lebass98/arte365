이달의 주제
회고하며 나아가기
문화예술교육이 펼쳐진 다양한 현장과 정책 시도들 속에서 우리는 어떤 나이테를 그려왔을까요? ‘지금, 여기’의 문화예술교육 현장에 집중하며 현재를 기록하고, 지나온 시간을 성찰하며 앞으로 나아갈 방향을 생각해 봅니다.
편집노트 읽기

이슈
인문과 예술은 삶과 어떻게 만나는가
인문정신문화 전담기관 첫해의 첫 질문
김자현 인문정신문화본부 본부장
2026년, 진흥원은 처음으로 ‘인문정신문화 사회적 확산 사업’의 전담기관이 되었다. 20여 년간 쌓아온 문화예술교육 정책 현장에 대한 감각과 철학이 이제 ‘인문정신문화’라는 새로운 영역과 만나게 된 것이다. 문화예술교육과 인문정신문화는 서로 다른 정책 언어와 방법론을 가지고 있지만, 국민의 삶 속에서 문화의 향유, 인문적 사유가 가능하게 한다는 같은 방향을 바라보고 있다. 

리뷰
두 도시에서 마주한 중장년의 감각
문화예술 감상 프로그램 ‘예술에 빠질 예.감.’
홍지연 마로이즘 대표
오랫동안 나는 미술의 현장 안에 있었다. 전시를 기획하고, 작품 앞에서 관객에게 말을 건네는 일을 반복하면서, 어느 순간부터는 작품보다 사람들의 얼굴을 더 오래 바라보게 되었다. 그림 앞에 선 몸의 각도, 시선이 머무는 시간, 그리고 그 시선이 이내 어디론가 미끄러지듯 흘러가는 순간들. 미술관은 늘 사람들로 채워져 있었지만, 그 안에는 설명하기 어려운 공백이 있었다.

아이디어
서로의 집에 손을 넣으면
모두의 예술교육⑪ 감각의 경계를 확장하기
김은설 작가
어릴 때 두꺼비 집을 만들어본 적 있는가. 손등 위에 흙을 올리고 조심조심 두드려 집을 짓고, 완성되면 손을 빼내어 작은 구멍을 남긴다. 그 구멍 속으로 누군가의 손가락이 들어올 때의 감각. 서로의 세계가 처음으로 맞닿는 그 순간. 나는 감각을 나누는 일이 꼭 그것과 같다고 생각한다.

2026년 꿈의 예술단 예비 거점기관 공모
