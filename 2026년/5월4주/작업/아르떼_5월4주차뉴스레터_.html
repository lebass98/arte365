[아르떼 로고]                                                            

 한국문화예술교육진흥원 뉴스레터
 2026년 5월 26일
회고하며 나아가기
문화예술교육이 펼쳐진 다양한 현장과 정책 시도들 속에서 우리는 어떤 나이테를 그려왔을까요? ‘지금, 여기’의 문화예술교육 현장에 집중하며 현재를 기록하고, 지나온 시간을 성찰하며 앞으로 나아갈 방향을 생각해 봅니다.
이슈
출렁이는 현장의 닻과 돛이 되어
[아르떼365] 4기 편집위원의 항해를 시작하며
백현주·김주리·김혜일·이화원·최선영

새롭게 구성된 [아르떼365] 4기 편집위원들이 각자의 자리에서 다시 질문을 시작한다. 정책과 현장, 인간다움과 관계, 그리고 예술이 삶과 만나는 방식에 대한 고민. 새로운 편집위원들과 함께 찾아갈 문화예술교육의 오늘과 내일을 미리 가늠해 본다. 
이슈
지금, 우리가 함께 질문해야 할 이유는
‘전환을 위한 질문’을 던지며
염신규 (사)한국문화정책연구소 소장

이제 문화예술교육은 누가 뭐라고 해도 우리 일상 속 가장 가까운 곳에서 마주할 수 있는 보편적 제도이다. 진흥원 20년이 쌓아 올린 이 성취는 분명히 인정되어야 하며 단단한 자산임이 틀림없다. 다만 오늘 우리가 다시 질문을 시작해야 하는 까닭은 이 성취에 결함이 있어서라기보다, 문화예술교육을 둘러싼 물음 자체가 전 세계적으로 겪고 있는 사회적 변화, 복지사회 담론과 민주주의의 위기와 맞닿아 있기 때문이다. 
아이디어
한 땀 한 땀, 이어가는 바다
오늘부터 그린㊻ 함께하는 바다 만들기
안성관 다시바다 대표

부산 광안대교 2층 교각을 지나며 우연히 본 바다가 어린 시절의 추억을 되살리며 내 마음속으로 훅 들어왔다. 그 순간 저 바다가 내 맘의 안식처가 될 거란 확신이 들었다. 그렇게 시작된 바다 수영이 내 인생을 바꿨다. 매일 새벽 해운대 바다에 입수할 때마다 내 맘은 점점 바다와 하나가 되었다. 바다 수영에 몰입하던 3년 차 어느 날, 검정 비닐봉지가 손가락 사이에 걸렸다.
