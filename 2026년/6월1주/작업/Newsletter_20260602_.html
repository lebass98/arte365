지금 문화예술교육은 무엇과 맞서고 있나
각자가 애쓰고 힘을 다하는 지점들로부터 출발해 문화예술교육이 마주한 현실에 대한 서로 다른 경험과 감각, 고민과 기대를 펼쳐놓습니다. 우리가 놓치고 있었던 질문과 아직 충분히 말해지지 않은 이야기를 발견하고자 합니다.
이슈
사회 변화와 제도 압박 속 대립과 성찰
독자 설문조사 결과① 데이터로 읽기
프로젝트 궁리

[아르떼365] 4기 편집위원회는 ‘지금 문화예술교육은 무엇과 맞서고 있나’라는 주제로 독자 설문조사를 기획했다. 그간 [아르떼365]에서 담아온 현장의 모습과 실제 현장의 감각이 점점 멀어지고 있지는 않은가, 현장의 이야기에서 고난과 실패를 덜어낸 채 모범사례 중심으로 재구성함으로써 생동감을 잃어버린 것은 아닌가 하는 문제의식과 성찰을 담은 기획이다.
이슈
부딪치고 흔들려도 끝내 살아 움직이는
독자 설문조사 결과② 키워드로 읽기
프로젝트 궁리 

총 881명이 참여한 이번 설문조사 결과에는 현재의 문화예술교육 현장을 인식하는 2천여 개의 키워드와 경험, 그리고 현장의 언어들이 담겼다. 그중 ‘예술교육가·문화예술교육 강사’(이하 예술교육가) 192명의 답변 속 총 499개 키워드를 중심으로 반복해서 등장하는 고민과 질문, 현장의 감각들을 따라가 보고자 한다. 


[진흥원] 2026 생애주기별 문화예술교육 지원사업 「꿈다락 문화예술학교」 프로그램 안내 (6~11월, 프로그램별 상이)

[전북] 2026 도민참여 전북형 문화집강소 프로젝트 서부권 운영단체 모집 재공고 (~6.12.)

[광주] 2026 영유아 교원연수 ‘예술의 감각을 채우다’ 개최 (6.17.)

[울산] 2026 아트웨이브(울산예술인 역량강화 프로그램) 참여예술인 모집 (~6.19.)
