예술교육가의 키워드①
배인숙·추유선·한명일

결국 내가 하는 예술교육도 어느 순간부터는 주입식으로 흘러가고 있는 듯한 느낌을 받을 때가 종종 있다. 그러다가 ‘이러면 안 되지’하면서 일부를 생략하고 여백의 시간을 만들기도 한다. 하지만 그럴 때마다 이 방식이 충분한 것으로 받아들여질지, 혹은 ‘덜 하는 사람’으로 보이지 않을지에 대한 두려움이 함께 따라온다.

예술교육가의 키워드②	
문해주·박성진·송선미

작은 도전 중에 발달장애 가족이 직접 창작자가 되어보는 것이 있다. 꾸준히 만나면서 서로의 일상을 함께 나누다 보니 ‘보호자의 역할’이 매우 중요하다는 것을 자연스럽게 알게 되었다. 내가 만나온 발달장애 창작자들은 특수학교를 다니며 자신의 언어 표현이 어려운 경우가 많았다. 우리의 만남은 서로가 함께 소통할 수 있는 ‘예술 언어’를 만들어가는 과정이었다.
