지금 문화예술교육 현장은 끊임없이 ‘새로움’과 ‘차별성’을 요구받고 있다. 전문가들은 여전히 철학과 가치, 예술교육적 깊이를 말하지만 실제 사업 현장에서는 이전에 없던 방식, 눈에 띄는 형식, 새로운 대상과 장르의 결합이 선정의 중요한 기준이 되곤 한다. AI는 이러한 요구에 매우 능숙하게 대응한다.

박형주·이초영·임재춘

우리는 지금 정보가 경험을 대체하는 시대에 살고 있다. 경험이란 본래 특정 시간과 공간에서 자신의 육체를 투과하며 완성되는 것이다. 그러나 요즘의 청소년들은 자연과 놀이, 심지어 타인과의 관계조차 스크린이라는 매개를 통해 정보로 먼저 접한다. 요리 영상을 보며 맛을 안다고 착각하지만, 식재료의 차가운 촉감이나 칼끝에 전해지는 저항감은 상실된다.
