연구자의 고민①
최보연·최진·홍혜전

문화예술교육 사업은 늘 좋은 의도에서 시작한다. 더 많은 사람이 예술을 경험할 수 있도록 하고, 문화적 기회를 넓히며, 사회적 격차를 줄이기 위해 다양한 사업이 만들어진다. 그러나 문화예술교육 현장을 오랫동안 연구하고 운영하면서 점점 더 커진 질문이 있다. 문화예술교육은 과연 누구를 위한 교육인가.

연구자의 고민②
박진영·윤기훈·현혜연

학기 초에 수업 계획을 세우고 학생들에게 공유하지만, 학기마다 만나는 학생들의 특성과 성향에 따라 감정들의 선별과 수업 방식에 조금씩 차이가 난다. 말하자면 수학 공식처럼 딱 떨어지게 수업을 운영하는 것은 아니라는 것이다. 인간 세상에 답이 없고 예술에도 답이 없듯이, 이러한 나의 수업 전개 방식을 스스로 맞춤형 수업이라고 칭하고 싶다.
