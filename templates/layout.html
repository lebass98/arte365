<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ siteName }}{% endblock %}</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #080b11;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.06);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.15);
      --accent-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Background glow decorations */
    .glow-circle {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(192, 132, 252, 0.03) 50%, transparent 100%);
      top: -100px;
      right: -100px;
      z-index: 1;
      pointer-events: none;
    }

    .glow-circle-2 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244, 114, 182, 0.05) 0%, rgba(99, 102, 241, 0.02) 50%, transparent 100%);
      bottom: -200px;
      left: -200px;
      z-index: 1;
      pointer-events: none;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="glow-circle"></div>
  <div class="glow-circle-2"></div>

  {% include "templates/partials/header.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "templates/partials/footer.html" %}
</body>
</html>
